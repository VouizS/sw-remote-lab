<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW Remote Lab</title>
  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box {
      background: #0f172a;
      padding: 30px;
      border-radius: 20px;
      max-width: 420px;
      border: 1px solid #334155;
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      margin: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>SW Remote Lab</h1>
    <p>WebOS inicial funcionando pelo Termux.</p>
    <button onclick="alert('Kali Desktop será conectado depois')">Abrir Kali Desktop</button>
    <button onclick="alert('Terminal Web em desenvolvimento')">Terminal Web</button>
  </div>
</body>
</html>
