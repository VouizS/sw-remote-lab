<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW Remote Lab</title>
  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      background: #0f172a;
      padding: 32px;
      border-radius: 24px;
      max-width: 480px;
      width: calc(100% - 32px);
      border: 1px solid #334155;
    }

    h1 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 38px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
    }

    a, button {
      display: inline-block;
      background: #2563eb;
      color: white;
      border: none;
      padding: 16px 20px;
      border-radius: 14px;
      font-weight: bold;
      margin: 8px;
      text-decoration: none;
      font-size: 16px;
    }

    .warn {
      margin-top: 18px;
      font-size: 14px;
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>SW Remote Lab</h1>

    <p>
      Acesso experimental ao Kali NetHunter via navegador.
      O servidor roda pelo Termux no Android.
    </p>

    <a href="http://192.168.1.30:6080/vnc.html" target="_blank">
      Abrir Kali Desktop
    </a>

    <button onclick="alert('Terminal Web será configurado depois.')">
      Terminal Web
    </button>

    <p class="warn">
      Atenção: o Kali Desktop só funciona quando o Termux, VNC e noVNC estiverem ligados no celular.
    </p>
  </div>
</body>
</html>
